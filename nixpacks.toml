# Nixpacks build config for Railway
# Explicitly declares Node.js 20 so Nixpacks installs npm + node

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install --legacy-peer-deps",
  "npm install got@11.8.6 --no-save"
]

[start]
cmd = "node --max-old-space-size=380 --expose-gc packages/api/src/index.js"
