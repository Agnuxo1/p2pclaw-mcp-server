# Nixpacks build config for Railway
# Explicitly declares Node.js 20 so Nixpacks installs npm + node

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[start]
cmd = "node --max-old-space-size=460 --expose-gc packages/api/src/index.js"
